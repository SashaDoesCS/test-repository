# ===========================================================
# ROAD BARRIERS
# Used for district boundary enforcement and pedestrian analysis
# ===========================================================

road_barriers:
  freeways:
    - name: "SR-17"
      type: "freeway"
      caltrans_route: "17"
      pems_stations: ["VDS 401632", "VDS 401633"]  # Los Gatos segment
    - name: "SR-85 (West Valley Freeway)"
      type: "freeway"
      caltrans_route: "85"
      pems_stations: ["VDS 400812", "VDS 400813"]

  major_arterials:
    - name: "Los Gatos Boulevard"
      type: "major_arterial"
      speed_limit_mph: 35
      aadt_estimate: 23000
    - name: "Lark Avenue"
      type: "arterial"
      speed_limit_mph: 35
    - name: "Blossom Hill Road"
      type: "major_arterial"
      speed_limit_mph: 35
      aadt_estimate: 11000  # Post SR-85 opening; was 23000 prior
    - name: "Camden Avenue"
      type: "major_arterial"
      speed_limit_mph: 35
    - name: "Los Gatos-Almaden Road"
      type: "arterial"
      speed_limit_mph: 35
    - name: "Union Avenue"
      type: "arterial"
      speed_limit_mph: 30
    - name: "Branham Lane"
      type: "arterial"
      speed_limit_mph: 35

# ===========================================================
# DATA SOURCES
# ===========================================================

data_sources:
  census:
    dataset: "ACS 5-Year Estimates"
    vintage: "2019-2023"
    geography: "block_group"
    api_base: "https://api.census.gov/data"
    variables:
      total_population: "B01001_001E"
      median_income: "B19013_001E"
      zero_vehicle_hh: "B08201_002E"
      total_households: "B08201_001E"
      transit_commute: "B08301_010E"
      total_workers: "B08301_001E"
      pop_under_18: "B09001_001E"
      pop_65_plus: "B01001_020E"  # simplified; sum multiple bins in code

  gtfs:
    provider: "VTA"
    url: "https://www.vta.org/open-data"
    local_path: "data/geospatial/gtfs/"

  traffic:
    pems_url: "https://pems.dot.ca.gov/"
    switrs_url: "https://iswitrs.chp.ca.gov/Reports/jsp/index.jsp"

  geospatial:
    town_boundary_source: "US Census TIGER/Line, Los Gatos CDP"
    osm_extract: "Geofabrik California extract, filtered to bounding box"

# ===========================================================
# COVERAGE ANALYSIS
# ===========================================================

coverage:
  walk_access_buffer_miles: 0.50   # Standard 10-min walk
  walk_access_buffer_close_miles: 0.25  # 5-min walk
  walk_speed_mph: 3.0
