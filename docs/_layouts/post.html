---
layout: default
---
<main>
  <section class="sec">
    <div class="wrap-narrow">
      {% if page.date %}
      <div class="eyebrow">{{ page.date | date: "%B %-d, %Y" }}</div>
      {% endif %}
      <h1 style="font-size: clamp(24px, 4vw, 40px); margin-bottom: 16px;">{{ page.title }}</h1>
      {% if page.description %}
      <p class="lede" style="margin-bottom: 32px;">{{ page.description }}</p>
      {% endif %}
      <div class="post-body" style="margin-top: 28px;">
        {{ content }}
      </div>
    </div>
  </section>
</main>
