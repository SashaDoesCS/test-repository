# Destination in the lgthinktank GitHub repo: .github/workflows/site-guard.yml
#
# On every push to main, this builds the Jekyll site and verifies that each
# rendered HTML page contains the shared <header class="site-header"> element
# that every layout in docs/_layouts/ produces. That marker is only present
# when the page rendered through a valid layout chain — so its absence proves
# the layout was stripped (Pages CMS's failure mode) or the build is otherwise
# broken.
#
# If validation fails, the workflow reverts the offending commit and pushes
# the revert. The live site rolls back to the last good commit automatically.
#
# Required: in repo Settings → Actions → General → Workflow permissions,
# select "Read and write permissions" so the workflow can push the revert.

name: Site guard

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: site-guard
  cancel-in-progress: false

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with history for revert)
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Skip if this commit is itself an auto-revert
        id: skip
        run: |
          msg=$(git log -1 --pretty=%s)
          if [[ "$msg" == "site-guard: auto-revert broken commit"* ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Ruby
        if: steps.skip.outputs.skip == 'false'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install Jekyll
        if: steps.skip.outputs.skip == 'false'
        run: gem install --no-document jekyll bundler

      - name: Build site
        if: steps.skip.outputs.skip == 'false'
        working-directory: docs
        run: jekyll build --strict_front_matter --destination ../_site

      - name: Validate every rendered page has its layout
        if: steps.skip.outputs.skip == 'false'
        run: |
          set -e
          fail=0
          # Every layout in docs/_layouts/ ultimately renders <header class="site-header">.
          # Its absence in a built page means the layout chain was broken.
          while IFS= read -r -d '' f; do
            if ! grep -q 'class="site-header"' "$f"; then
              echo "::error file=$f::missing 'class=\"site-header\"' — layout was stripped or build is broken"
              fail=1
            fi
          done < <(find _site -name '*.html' -print0)
          # Belt-and-suspenders: critical pages must exist and be non-trivially sized.
          for critical in _site/index.html _site/los-gatos-transit/index.html _site/404.html; do
            if [[ ! -f "$critical" ]]; then
              echo "::error::missing critical page: $critical"
              fail=1
            elif [[ $(wc -c < "$critical") -lt 2000 ]]; then
              echo "::error file=$critical::page is suspiciously small ($(wc -c < "$critical") bytes) — likely no layout"
              fail=1
            fi
          done
          exit $fail

      - name: Auto-revert broken commit
        if: failure() && steps.skip.outputs.skip == 'false'
        run: |
          set -e
          bad=$(git rev-parse HEAD)
          short=$(git rev-parse --short HEAD)
          author=$(git log -1 --pretty='%an <%ae>')
          subject=$(git log -1 --pretty='%s')
          git config user.name  "site-guard[bot]"
          git config user.email "site-guard@users.noreply.github.com"
          git revert --no-edit "$bad"
          # Override the default revert message with a clear, greppable one.
          git commit --amend -m "site-guard: auto-revert broken commit $short" \
                              -m "Original commit: $bad" \
                              -m "Original author:  $author" \
                              -m "Original subject: $subject" \
                              -m "Reason: site failed build or layout validation in CI. See the failed run for details." \
                              -m "If you intended this change, fix the issue and push again."
          git push origin HEAD:main
