media:
  input: docs/assets/images
  output: /assets/images

content:
  # ── Homepage ─────────────────────────────────────────
  - name: home
    label: Homepage
    type: file
    path: docs/index.html
    fields:
      - { name: title, label: Browser tab title, type: string }
      - { name: description, label: Meta description (for search engines), type: text }

      - name: hero_eyebrow
        label: Hero — small label above the headline
        type: string
      - name: hero_headline
        label: Hero — headline (use *asterisks* for italics)
        type: text
      - name: hero_lede
        label: Hero — intro paragraph
        type: text
        options: { rows: 4 }
      - name: hero_ctas
        label: Hero — buttons
        type: object
        list: true
        fields:
          - { name: label, label: Button text, type: string }
          - { name: href, label: Link, type: string }
          - name: style
            label: Style
            type: select
            options:
              values: ["primary", "ghost"]
              default: "primary"

      - { name: projects_heading, label: Projects section — heading, type: string }
      - { name: projects_intro, label: Projects section — intro line, type: text }
      - name: projects
        label: Projects
        type: object
        list: true
        fields:
          - { name: title, label: Title, type: string }
          - { name: status, label: Status badge text, type: string }
          - name: status_kind
            label: Status style
            type: select
            options:
              values: ["live", "soon"]
              default: "live"
          - { name: href, label: Link (leave blank for a non-clickable "coming soon" card), type: string, required: false }
          - { name: image, label: Optional image, type: image, required: false }
          - { name: image_alt, label: Image alt text, type: string, required: false }
          - name: blurb
            label: Description (supports **bold**, *italic*, [links](url))
            type: text
            options: { rows: 5 }
          - { name: arrow_label, label: Bottom arrow text, type: string }

      - { name: about_heading, label: About section — heading, type: string }
      - name: about_body
        label: About section — body (supports **bold**, *italic*, [links](url), and blank lines for paragraphs)
        type: text
        options: { rows: 10 }
      - { name: contact_prompt, label: Contact line — prompt before email, type: string }
      - { name: contact_email, label: Contact email, type: string }

  # ── Transit project landing page ─────────────────────
  - name: transit-home
    label: Transit Project Landing Page
    type: file
    path: docs/los-gatos-transit/index.html
    fields:
      - { name: title, label: Browser tab title, type: string }
      - { name: description, label: Meta description, type: text }

      - { name: hero_kicker, label: Hero — small label above the headline, type: string }
      - { name: hero_headline, label: Hero — headline (use *asterisks* for italics), type: text }
      - name: hero_lede_1
        label: Hero — first paragraph (supports **bold**, *italic*, [links](url))
        type: text
        options: { rows: 5 }
      - name: hero_lede_2
        label: Hero — second paragraph
        type: text
        options: { rows: 5 }
      - name: hero_ctas
        label: Hero — buttons
        type: object
        list: true
        fields:
          - { name: label, label: Button text, type: string }
          - { name: href, label: Link, type: string }
          - name: style
            label: Style
            type: select
            options: { values: ["primary", "ghost"], default: "primary" }

      - name: metrics_row_1
        label: Top metrics row (4 cells)
        type: object
        list: true
        fields:
          - { name: value, label: Big number, type: string }
          - name: kind
            label: Color emphasis
            type: select
            options: { values: ["neutral", "alert", "warn"], default: "neutral" }
          - { name: desc, label: Description, type: text }
          - { name: src, label: Source line, type: string }

      - name: metrics_row_2
        label: Second metrics row (4 cells)
        type: object
        list: true
        fields:
          - { name: value, label: Big number, type: string }
          - name: kind
            label: Color emphasis
            type: select
            options: { values: ["neutral", "alert", "warn"], default: "neutral" }
          - { name: desc, label: Description, type: text }
          - { name: src, label: Source line, type: string }

      - name: why_blocks
        label: "Why this matters" — two columns
        type: object
        list: true
        fields:
          - { name: heading, label: Column heading, type: string }
          - name: body
            label: Column body (supports markdown — paragraphs, **bold**, [links](url))
            type: text
            options: { rows: 8 }
          - name: pills
            label: Methodology pills (optional)
            type: object
            list: true
            required: false
            fields:
              - { name: label, label: Pill text, type: string }
              - { name: highlight, label: Highlight this pill, type: boolean, default: false }

      - { name: subprojects_heading, label: "What is in this project" — heading, type: string }
      - { name: subprojects_intro, label: "What is in this project" — intro line, type: text }
      - name: subprojects
        label: Sub-project cards
        type: object
        list: true
        fields:
          - { name: title, label: Title, type: string }
          - { name: status, label: Status badge text, type: string }
          - { name: href, label: Link (leave blank to disable), type: string, required: false }
          - { name: image, label: Optional image, type: image, required: false }
          - { name: image_alt, label: Image alt text, type: string, required: false }
          - name: blurb
            label: Description
            type: text
            options: { rows: 5 }
          - { name: arrow_label, label: Bottom arrow text, type: string }

      - name: timeline
        label: Phase timeline
        type: object
        list: true
        fields:
          - { name: phase, label: Phase label (e.g. "Phase A"), type: string }
          - { name: name, label: Phase name, type: string }
          - { name: status, label: Status text, type: string }
          - name: status_kind
            label: Status style
            type: select
            options: { values: ["done", "active", "pending"], default: "pending" }
          - name: body
            label: Description
            type: text
            options: { rows: 4 }

      - { name: methods_heading, label: Methods section — heading, type: string }
      - { name: sources_col_1, label: Sources table — column 1 header, type: string }
      - { name: sources_col_2, label: Sources table — column 2 header, type: string }
      - { name: sources_col_3, label: Sources table — column 3 header, type: string }
      - name: sources
        label: Data sources table
        type: object
        list: true
        fields:
          - { name: source, label: Source, type: string }
          - { name: provides, label: What it provides, type: text }
          - { name: used_for, label: Used for, type: text }

      - name: callout_body
        label: Callout box — body
        type: text
        options: { rows: 3 }
      - { name: callout_link_href, label: Callout — link URL, type: string, required: false }
      - { name: callout_link_label, label: Callout — link text, type: string, required: false }

      - { name: cta_block_heading, label: Bottom CTA — heading, type: string }
      - { name: cta_block_body, label: Bottom CTA — body, type: text }
      - { name: cta_block_button_label, label: Bottom CTA — button text, type: string }
      - { name: cta_block_button_href, label: Bottom CTA — button link, type: string }

  # ── Articles index page ─────────────────────────────
  - name: articles-index
    label: Articles Index Page
    type: file
    path: docs/articles/index.html
    fields:
      - { name: title, label: Browser tab title, type: string }
      - { name: description, label: Meta description, type: text }
      - { name: page_heading, label: Page heading, type: string }
      - { name: page_intro, label: Intro line under the heading, type: text }
      - { name: empty_state, label: Message shown when there are no articles yet, type: string }

  # ── 404 page ─────────────────────────────────────────
  - name: not-found
    label: 404 Page
    type: file
    path: docs/404.html
    fields:
      - { name: title, label: Browser tab title, type: string }
      - { name: code, label: Big code (e.g. "404"), type: string }
      - { name: headline, label: Headline, type: string }
      - { name: body, label: Description, type: text }
      - name: actions
        label: Action buttons
        type: object
        list: true
        fields:
          - { name: label, label: Button text, type: string }
          - { name: href, label: Link, type: string }
          - name: style
            label: Style
            type: select
            options: { values: ["primary", "ghost"], default: "primary" }

  # ── Articles & research (collection) ─────────────────
  # Articles ARE prose, so rich-text is the right tool here — the layout
  # supplies all the chrome, the editor only types the article body.
  - name: articles
    label: Articles & Research
    type: collection
    path: docs/_articles
    view:
      fields: [title, date, description]
    fields:
      - { name: title, label: Title, type: string, required: true }
      - { name: date, label: Date, type: date, required: true }
      - { name: description, label: Short description (shown as subtitle), type: string }
      - { name: body, label: Article content, type: rich-text }
